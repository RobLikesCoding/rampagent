<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ramp Log" />
  <meta name="theme-color" content="#0b1120" />
  <title>Ramp Agent · KRJB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1120;
      --surface:   #111827;
      --card:      #1a2540;
      --border:    #2a3a5c;
      --blue:      #3b82f6;
      --blue-dim:  #1d4ed8;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 20px; height: 20px; fill: white; }

    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .badge {
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Main ── */
    main { padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Aircraft selector ── */
    .select-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .select-wrap select {
      width: 100%;
      appearance: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      padding: 16px 48px 16px 16px;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    .select-wrap select:focus { border-color: var(--blue); }

    .select-chevron {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    /* ── Aircraft info card ── */
    .ac-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }
    .ac-card.visible { display: block; }

    .ac-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .ac-reg {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .status-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(34,197,94,.15);
      color: var(--green);
      border: 1px solid rgba(34,197,94,.3);
    }

    .ac-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-item label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }
    .meta-item span {
      font-size: 14px;
      font-weight: 600;
    }

    /* ── Log form ── */
    .form-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: none;
    }
    .form-card.visible { display: block; }

    .form-card h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--muted);
      letter-spacing: .3px;
    }

    /* ── Stepper inputs ── */
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stepper button {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      width: 56px;
      height: 56px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .stepper button:active { background: var(--border); }

    .stepper input {
      flex: 1;
      background: none;
      border: none;
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      height: 56px;
      outline: none;
      width: 0; /* flex will expand */
      min-width: 0;
    }
    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* fuel is a regular text input */
    .fuel-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      height: 56px;
      outline: none;
      transition: border-color .15s;
    }
    .fuel-input:focus { border-color: var(--blue); }
    .fuel-input::placeholder { color: var(--border); font-size: 18px; }

    .field-unit {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 5px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── Misc notes ── */
    .notes-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      padding: 14px;
      outline: none;
      resize: none;
      height: 80px;
      font-family: inherit;
      transition: border-color .15s;
    }
    .notes-input:focus { border-color: var(--blue); }
    .notes-input::placeholder { color: var(--muted); }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      height: 58px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit.visible { display: flex; }
    .btn-submit:active { background: var(--blue-dim); transform: scale(.98); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; opacity: .3; margin-bottom: 16px; }
    .empty p { font-size: 15px; }
  
    /* ── Weather ── */
    .weather-section { margin-top: 8px; }
    .weather-section.hidden { display: none; }

    /* Current conditions card */
    .wx-now {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wx-now-left { display: flex; align-items: center; gap: 14px; }

    .wx-compass {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .wx-compass-arrow { font-size: 26px; display: inline-block; }

    .wx-speed { font-size: 38px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
    .wx-speed-unit { font-size: 15px; font-weight: 600; color: var(--muted); }
    .wx-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .wx-gust-inline { color: var(--amber); font-weight: 700; }

    .wx-now-right { text-align: right; }
    .wx-cond-icon { font-size: 28px; display: block; margin-bottom: 4px; }
    .wx-cond-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .wx-temp { font-size: 18px; font-weight: 700; }

    /* Peak banner */
    .wx-peak {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }
    .wx-peak span { font-size: 13px; font-weight: 600; }
    .wx-peak strong { color: var(--amber); }

    /* Forecast cards */
    .wx-forecast {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .wx-forecast::-webkit-scrollbar { display: none; }

    .wx-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      flex: 0 0 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .wx-card.wx-now-card {
      border-color: var(--blue);
      background: rgba(59,130,246,.12);
    }

    .wx-card-time {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .3px;
    }
    .wx-now-card .wx-card-time { color: var(--blue); }

    .wx-card-icon { font-size: 28px; line-height: 1; }

    .wx-card-wind {
      text-align: center;
      line-height: 1.2;
    }
    .wx-card-spd { font-size: 20px; font-weight: 800; }
    .wx-card-unit { font-size: 10px; font-weight: 600; color: var(--muted); }
    .wx-card-dir { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .wx-card-gust { font-size: 11px; color: var(--amber); font-weight: 700; }
    .wx-card-temp { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }

    .wx-loading { text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }

    .wind-calm   { color: var(--green); }   /* < 20 kt          */
    .wind-mod    { color: var(--green); }   /* unused — kept for safety */
    .wind-fresh  { color: var(--amber); }   /* 20–35 kt or high gust variability */
    .wind-strong { color: var(--red); }     /* > 35 kt          */

    .wx-updated { font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 8px; }

    /* ── Daily summary ── */
    .summary-section { margin-top: 20px; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      text-align: center;
    }

    .summary-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .summary-value {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .summary-unit {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 4px;
    }
</style>
</head>

      <div class="meta-item">
        <label>Purpose</label>
        <span id="acPurpose">—</span>
      </div>
    </div>
  </div>

  <!-- Log form -->
  <div class="form-card" id="formCard">
    <h3>Log Activity</h3>

    <!-- Passengers -->
    <div class="field">
      <label class="field-label">Passengers Boarded</label>
      <div class="stepper">
        <button type="button" onclick="step('boarded', -1)">−</button>
        <input type="number" id="boarded" value="0" min="0" max="99" inputmode="numeric" />
        <button type="button" onclick="step('boarded', 1)">+</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Passengers Disembarked</label>
      <div class="stepper">
        <button type="button" onclick="step('disembarked', -1)">−</button>
        <input type="number" id="disembarked" value="0" min="0" max="99" inputmode="numeric" />
        <button type="button" onclick="step('disembarked', 1)">+</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Fuel -->
    <div class="field">
      <label class="field-label">Jet A Fuel Added</label>
      <input type="number" class="fuel-input" id="fuel" placeholder="0" min="0" inputmode="decimal" />
      <div class="field-unit">US Gallons</div>
    </div>

    <div class="divider"></div>

    <!-- Notes -->
    <div class="field">
      <label class="field-label">Notes / Misc</label>
      <textarea class="notes-input" id="notes" placeholder="Any additional notes…"></textarea>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitLog()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M5 13l4 4L19 7"/>
    </svg>
    Submit Log
  </button>

  <!-- Weather -->
  <div class="weather-section" id="weatherSection">
    <div class="section-label">Weather · KRJB</div>
    <div id="wxContent"><div class="wx-loading">Loading weather…</div></div>
  </div>

  <!-- Daily summary -->
  <div class="summary-section" id="summarySection">
    <div class="section-label">Today at KRJB</div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Landings</div>
        <div class="summary-value" id="summaryLandings">—</div>
        <div class="summary-unit">movements</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Fuel Loaded</div>
        <div class="summary-value" id="summaryFuel">—</div>
        <div class="summary-unit">US gallons</div>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast">✓ Log submitted successfully</div>

<script>
  // ── Mock data (replace with API call) ──────────────────────────────────────
  // Each object represents a movement currently on the ground.
  // Fields map to what the API will return; swap fetchGroundMovements() body
  // for a real fetch() once you have the endpoint details.
  const MOCK_MOVEMENTS = [
    {
      id: "mov_001",
      registration: "N945RF",
      operator: "Charm Aviation",
      type: "Bell 407",
      arrival: "15:02",
      purpose: "Air Tour",
    },
    {
      id: "mov_002",
      registration: "N98EG",
      operator: "Helicopter Flight Services",
      type: "Bell 407",
      arrival: "14:51",
      purpose: "Air Tour",
    },
  ];

  let movements = [];
  let selectedMovement = null;

  // ── Fetch movements on ground ──────────────────────────────────────────────
  async function fetchGroundMovements() {
    // TODO: replace with real API call, e.g.:
    // const res = await fetch('/api/movements?status=on_ground&airport=KRJB');
    // return await res.json();
    return MOCK_MOVEMENTS;
  }

  async function loadMovements() {
    movements = await fetchGroundMovements();

    const select = document.getElementById('acSelect');
    const badge  = document.getElementById('groundCount');

    // clear existing options beyond the placeholder
    while (select.options.length > 1) select.remove(1);

    movements.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `${m.registration} · ${m.operator}`;
      select.appendChild(opt);
    });

    badge.textContent = `${movements.length} on ground`;
  }

  // ── Select aircraft ────────────────────────────────────────────────────────
  function selectAircraft(id) {
    selectedMovement = movements.find(m => m.id === id) || null;

    const card    = document.getElementById('acCard');
    const form    = document.getElementById('formCard');
    const btn     = document.getElementById('submitBtn');

    const wxSection = document.getElementById('weatherSection');
    if (!selectedMovement) {
      card.classList.remove('visible');
      form.classList.remove('visible');
      btn.classList.remove('visible');
      wxSection.classList.remove('hidden');
      return;
    }
    wxSection.classList.add('hidden');

    document.getElementById('acReg').textContent      = selectedMovement.registration;
    document.getElementById('acOperator').textContent = selectedMovement.operator;
    document.getElementById('acType').textContent     = selectedMovement.type;
    document.getElementById('acArrival').textContent  = selectedMovement.arrival;
    document.getElementById('acPurpose').textContent  = selectedMovement.purpose;

    // reset form values
    document.getElementById('boarded').value    = 0;
    document.getElementById('disembarked').value = 0;
    document.getElementById('fuel').value        = '';
    document.getElementById('notes').value       = '';

    card.classList.add('visible');
    form.classList.add('visible');
    btn.classList.add('visible');
  }

  // ── Stepper helper ─────────────────────────────────────────────────────────
  function step(fieldId, delta) {
    const input = document.getElementById(fieldId);
    const val   = parseInt(input.value, 10) || 0;
    input.value = Math.max(0, val + delta);
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitLog() {
    if (!selectedMovement) return;

    const payload = {
      movementId:   selectedMovement.id,
      boarded:      parseInt(document.getElementById('boarded').value, 10)    || 0,
      disembarked:  parseInt(document.getElementById('disembarked').value, 10) || 0,
      fuelGallons:  parseFloat(document.getElementById('fuel').value)          || 0,
      notes:        document.getElementById('notes').value.trim(),
      loggedAt:     new Date().toISOString(),
    };

    console.log('Submitting payload:', payload);

    // TODO: replace with real API call, e.g.:
    // await fetch(`/api/movements/${payload.movementId}`, {
    //   method: 'PATCH',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify(payload),
    // });

    showToast();

    // reset selection
    document.getElementById('acSelect').value = '';
    selectAircraft('');
  }

  // ── Toast notification ─────────────────────────────────────────────────────
  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  // ── Weather ────────────────────────────────────────────────────────────────
  const WX_LAT = 40.7007;   // update to exact heliport coordinates
  const WX_LON = -74.0128;

  const WMO_ICONS = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌧️', 55:'🌧️',
    61:'🌦️', 63:'🌧️', 65:'🌧️',
    71:'🌨️', 73:'❄️', 75:'❄️',
    80:'🌦️', 81:'🌧️', 82:'⛈️',
    95:'⛈️', 96:'⛈️', 99:'⛈️'
  };

  const WMO_LABELS = {
    0:'Clear', 1:'Mostly clear', 2:'Partly cloudy', 3:'Overcast',
    45:'Fog', 48:'Freezing fog',
    51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
    61:'Light rain', 63:'Rain', 65:'Heavy rain',
    71:'Light snow', 73:'Snow', 75:'Heavy snow',
    80:'Showers', 81:'Heavy showers', 82:'Violent showers',
    95:'Thunderstorm', 96:'Thunderstorm', 99:'Severe storm'
  };

  function degToCompass(d) {
    return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
  }
  function windClass(spd, gust = 0) {
    // Gust variability rule: force amber if gusts exceed steady wind by 15+ kt
    if (gust - spd >= 15) return 'wind-fresh';
    if (spd > 35)  return 'wind-strong';
    if (spd >= 20) return 'wind-fresh';
    return 'wind-calm';
  }
  function arrowRotate(deg) {
    return `display:inline-block;transform:rotate(${(deg+180)%360}deg)`;
  }
  function fmtH(h) { return `${h%12||12}${h<12?'am':'pm'}`; }

  async function loadWeather() {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}` +
        `&hourly=temperature_2m,weathercode,windspeed_10m,winddirection_10m,windgusts_10m` +
        `&windspeed_unit=kn&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`;
      const data = await (await fetch(url)).json();
      renderWeather(data);
    } catch(e) {
      document.getElementById('wxContent').innerHTML = '<div class="wx-loading">Weather unavailable</div>';
    }
  }

  function renderWeather(data) {
    const now    = new Date();
    const nowH   = now.getHours();
    const times  = data.hourly.time;
    const speeds = data.hourly.windspeed_10m;
    const dirs   = data.hourly.winddirection_10m;
    const gusts  = data.hourly.windgusts_10m;
    const codes  = data.hourly.weathercode;
    const temps  = data.hourly.temperature_2m;

    const ci   = Math.max(0, times.findIndex(t => parseInt(t.split('T')[1]) === nowH));
    const spd  = Math.round(speeds[ci]);
    const gust = Math.round(gusts[ci]);
    const dir  = dirs[ci];
    const icon = WMO_ICONS[codes[ci]] ?? '🌡️';
    const cond = WMO_LABELS[codes[ci]] ?? '';
    const temp = Math.round(temps[ci]);

    // Peak gust from now until end of day
    let peakGust = 0, peakHour = nowH, peakDir = dir;
    for (let i = ci; i < times.length; i++) {
      const g = Math.round(gusts[i]);
      if (g > peakGust) { peakGust = g; peakHour = parseInt(times[i].split('T')[1]); peakDir = dirs[i]; }
    }

    // 6 slots × 2hr
    let cards = '';
    for (let s = 0; s < 6; s++) {
      const idx = ci + s * 2;
      if (idx >= times.length) break;
      const h    = parseInt(times[idx].split('T')[1]);
      const sp   = Math.round(speeds[idx]);
      const g    = Math.round(gusts[idx]);
      const d    = dirs[idx];
      const ic   = WMO_ICONS[codes[idx]] ?? '🌡️';
      const tp   = Math.round(temps[idx]);
      const isNow = s === 0;
      cards += `
        <div class="wx-card ${isNow ? 'wx-now-card' : ''}">
          <div class="wx-card-time">${isNow ? 'Now' : fmtH(h)}</div>
          <div class="wx-card-icon">${ic}</div>
          <div class="wx-card-wind">
            <div class="wx-card-spd ${windClass(sp, g)}">${sp}<span class="wx-card-unit"> kt</span></div>
            <div class="wx-card-dir"><span style="${arrowRotate(d)}">↑</span> ${degToCompass(d)}</div>
            ${g > sp + 3 ? `<div class="wx-card-gust">G ${g} kt</div>` : '<div class="wx-card-gust" style="visibility:hidden">-</div>'}
            <div class="wx-card-temp">${tp}°F</div>
          </div>
        </div>`;
    }

    const updated = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    document.getElementById('wxContent').innerHTML = `
      <div class="wx-updated">Updated ${updated}</div>

      <div class="wx-now">
        <div class="wx-now-left">
          <div class="wx-compass">
            <span class="wx-compass-arrow" style="${arrowRotate(dir)}">↑</span>
          </div>
          <div>
            <div><span class="wx-speed ${windClass(spd, gust)}">${spd}</span> <span class="wx-speed-unit">kt</span></div>
            <div class="wx-sub">${degToCompass(dir)} · ${dir}°${gust > spd+3 ? ` · <span class="wx-gust-inline">G ${gust} kt</span>` : ''}</div>
          </div>
        </div>
        <div class="wx-now-right">
          <span class="wx-cond-icon">${icon}</span>
          <div class="wx-temp">${temp}°F</div>
          <div class="wx-cond-label">${cond}</div>
        </div>
      </div>

      <div class="wx-peak">
        <span>⚠️</span>
        <span>Peak today: <strong>G ${peakGust} kt</strong> from ${degToCompass(peakDir)} around <strong>${fmtH(peakHour)}</strong></span>
      </div>

      <div class="wx-forecast">${cards}</div>
    `;
  }



  // ── Daily summary ──────────────────────────────────────────────────────────
  async function loadDailySummary() {
    // TODO: replace with real API call, e.g.:
    // const res  = await fetch('/api/summary?date=today&airport=KRJB');
    // const data = await res.json();
    // const { landings, fuelGallons } = data;
    const landings    = 14;   // mock
    const fuelGallons = 312;  // mock

    document.getElementById('summaryLandings').textContent = landings;
    document.getElementById('summaryFuel').textContent     = fuelGallons.toLocaleString();
  }

  loadMovements();
  loadWeather();
  loadDailySummary();
</script>

</body>
