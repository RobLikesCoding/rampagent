<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ramp Log" />
  <meta name="theme-color" content="#0b1120" />
  <title>Ramp Agent · KRJB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1120;
      --surface:   #111827;
      --card:      #1a2540;
      --border:    #2a3a5c;
      --blue:      #3b82f6;
      --blue-dim:  #1d4ed8;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 20px; height: 20px; fill: white; }

    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .badge {
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Main ── */
    main { padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Aircraft selector ── */
    .select-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .select-wrap select {
      width: 100%;
      appearance: none;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      padding: 16px 48px 16px 16px;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    .select-wrap select:focus { border-color: var(--blue); }

    .select-chevron {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    /* ── Aircraft info card ── */
    .ac-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }
    .ac-card.visible { display: block; }

    .ac-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .ac-reg {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .status-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(34,197,94,.15);
      color: var(--green);
      border: 1px solid rgba(34,197,94,.3);
    }

    .ac-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-item label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }
    .meta-item span {
      font-size: 14px;
      font-weight: 600;
    }

    /* ── Log form ── */
    .form-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: none;
    }
    .form-card.visible { display: block; }

    .form-card h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--muted);
      letter-spacing: .3px;
    }

    /* ── Stepper inputs ── */
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stepper button {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      width: 56px;
      height: 56px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .stepper button:active { background: var(--border); }

    .stepper input {
      flex: 1;
      background: none;
      border: none;
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      height: 56px;
      outline: none;
      width: 0; /* flex will expand */
      min-width: 0;
    }
    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* fuel is a regular text input */
    .fuel-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      height: 56px;
      outline: none;
      transition: border-color .15s;
    }
    .fuel-input:focus { border-color: var(--blue); }
    .fuel-input::placeholder { color: var(--border); font-size: 18px; }

    .field-unit {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 5px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── Misc notes ── */
    .notes-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      padding: 14px;
      outline: none;
      resize: none;
      height: 80px;
      font-family: inherit;
      transition: border-color .15s;
    }
    .notes-input:focus { border-color: var(--blue); }
    .notes-input::placeholder { color: var(--muted); }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      height: 58px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit.visible { display: flex; }
    .btn-submit:active { background: var(--blue-dim); transform: scale(.98); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; opacity: .3; margin-bottom: 16px; }
    .empty p { font-size: 15px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <!-- helicopter icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 9H13.5l-2-3H6L4.5 9H2v2h1.5l1 4h1l.5 2h1.5l.5-2h7l.5 2H16l.5-2h1l1-4H20V9h2V9zm-5.5 4h-9l-.67-2h10.34l-.67 2z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Ramp Agent</div>
      <div class="header-sub">KRJB · Skyports</div>
    </div>
  </div>
  <div class="badge" id="groundCount">0 on ground</div>
</header>

<main>

  <!-- Aircraft selector -->
  <div class="section-label">Aircraft on Ground</div>
  <div class="select-wrap">
    <select id="acSelect" onchange="selectAircraft(this.value)">
      <option value="">— Select aircraft —</option>
    </select>
    <div class="select-chevron">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </div>
  </div>

  <!-- Aircraft info -->
  <div class="ac-card" id="acCard">
    <div class="ac-card-header">
      <div class="ac-reg" id="acReg">—</div>
      <div class="status-pill">On Ground</div>
    </div>
    <div class="ac-meta">
      <div class="meta-item">
        <label>Operator</label>
        <span id="acOperator">—</span>
      </div>
      <div class="meta-item">
        <label>Type</label>
        <span id="acType">—</span>
      </div>
      <div class="meta-item">
        <label>Arrived</label>
        <span id="acArrival">—</span>
      </div>
      <div class="meta-item">
        <label>Purpose</label>
        <span id="acPurpose">—</span>
      </div>
    </div>
  </div>

  <!-- Log form -->
  <div class="form-card" id="formCard">
    <h3>Log Activity</h3>

    <!-- Passengers -->
    <div class="field">
      <label class="field-label">Passengers Boarded</label>
      <div class="stepper">
        <button type="button" onclick="step('boarded', -1)">−</button>
        <input type="number" id="boarded" value="0" min="0" max="99" inputmode="numeric" />
        <button type="button" onclick="step('boarded', 1)">+</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Passengers Disembarked</label>
      <div class="stepper">
        <button type="button" onclick="step('disembarked', -1)">−</button>
        <input type="number" id="disembarked" value="0" min="0" max="99" inputmode="numeric" />
        <button type="button" onclick="step('disembarked', 1)">+</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Fuel -->
    <div class="field">
      <label class="field-label">Jet A Fuel Added</label>
      <input type="number" class="fuel-input" id="fuel" placeholder="0" min="0" inputmode="decimal" />
      <div class="field-unit">US Gallons</div>
    </div>

    <div class="divider"></div>

    <!-- Notes -->
    <div class="field">
      <label class="field-label">Notes / Misc</label>
      <textarea class="notes-input" id="notes" placeholder="Any additional notes…"></textarea>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitLog()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M5 13l4 4L19 7"/>
    </svg>
    Submit Log
  </button>

</main>

<div class="toast" id="toast">✓ Log submitted successfully</div>

<script>
  // ── Mock data (replace with API call) ──────────────────────────────────────
  // Each object represents a movement currently on the ground.
  // Fields map to what the API will return; swap fetchGroundMovements() body
  // for a real fetch() once you have the endpoint details.
  const MOCK_MOVEMENTS = [
    {
      id: "mov_001",
      registration: "N945RF",
      operator: "Charm Aviation",
      type: "Bell 407",
      arrival: "15:02",
      purpose: "Air Tour",
    },
    {
      id: "mov_002",
      registration: "N98EG",
      operator: "Helicopter Flight Services",
      type: "Bell 407",
      arrival: "14:51",
      purpose: "Air Tour",
    },
  ];

  let movements = [];
  let selectedMovement = null;

  // ── Fetch movements on ground ──────────────────────────────────────────────
  async function fetchGroundMovements() {
    // TODO: replace with real API call, e.g.:
    // const res = await fetch('/api/movements?status=on_ground&airport=KRJB');
    // return await res.json();
    return MOCK_MOVEMENTS;
  }

  async function loadMovements() {
    movements = await fetchGroundMovements();

    const select = document.getElementById('acSelect');
    const badge  = document.getElementById('groundCount');

    // clear existing options beyond the placeholder
    while (select.options.length > 1) select.remove(1);

    movements.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `${m.registration} · ${m.operator}`;
      select.appendChild(opt);
    });

    badge.textContent = `${movements.length} on ground`;
  }

  // ── Select aircraft ────────────────────────────────────────────────────────
  function selectAircraft(id) {
    selectedMovement = movements.find(m => m.id === id) || null;

    const card    = document.getElementById('acCard');
    const form    = document.getElementById('formCard');
    const btn     = document.getElementById('submitBtn');

    if (!selectedMovement) {
      card.classList.remove('visible');
      form.classList.remove('visible');
      btn.classList.remove('visible');
      return;
    }

    document.getElementById('acReg').textContent      = selectedMovement.registration;
    document.getElementById('acOperator').textContent = selectedMovement.operator;
    document.getElementById('acType').textContent     = selectedMovement.type;
    document.getElementById('acArrival').textContent  = selectedMovement.arrival;
    document.getElementById('acPurpose').textContent  = selectedMovement.purpose;

    // reset form values
    document.getElementById('boarded').value    = 0;
    document.getElementById('disembarked').value = 0;
    document.getElementById('fuel').value        = '';
    document.getElementById('notes').value       = '';

    card.classList.add('visible');
    form.classList.add('visible');
    btn.classList.add('visible');
  }

  // ── Stepper helper ─────────────────────────────────────────────────────────
  function step(fieldId, delta) {
    const input = document.getElementById(fieldId);
    const val   = parseInt(input.value, 10) || 0;
    input.value = Math.max(0, val + delta);
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitLog() {
    if (!selectedMovement) return;

    const payload = {
      movementId:   selectedMovement.id,
      boarded:      parseInt(document.getElementById('boarded').value, 10)    || 0,
      disembarked:  parseInt(document.getElementById('disembarked').value, 10) || 0,
      fuelGallons:  parseFloat(document.getElementById('fuel').value)          || 0,
      notes:        document.getElementById('notes').value.trim(),
      loggedAt:     new Date().toISOString(),
    };

    console.log('Submitting payload:', payload);

    // TODO: replace with real API call, e.g.:
    // await fetch(`/api/movements/${payload.movementId}`, {
    //   method: 'PATCH',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify(payload),
    // });

    showToast();

    // reset selection
    document.getElementById('acSelect').value = '';
    selectAircraft('');
  }

  // ── Toast notification ─────────────────────────────────────────────────────
  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadMovements();
</script>

</body>
</html>
